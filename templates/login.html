<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { max-width: 400px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eaeaea; }
        .btn-primary { background-color: #2c3e50; border: none; padding: 12px; border-radius: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #1a252f; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .signup-link { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card text-center">
            <h2 class="mb-4" style="color: #2c3e50; font-weight: 800;">Health<span style="color: #27ae60;">Guard</span> AI</h2>
            <p class="text-muted mb-4">أهلاً بك في منصة التشخيص الذكي</p>
            
            {% if error %}
            <div class="alert alert-danger p-2" style="border-radius: 10px; font-size: 14px;">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST" class="text-end">
                <div class="mb-3">
                    <label class="form-label text-muted">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" placeholder="أدخل اسمك" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 text-white">دخول آمن</button>
            </form>
            
            <div class="mt-4">
                <p class="text-muted">ليس لديك حساب؟ <a href="/signup" class="signup-link">أنشئ حساباً جديداً</a></p>
            </div>
        </div>
    </div>
</body>
</html>
