<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container { 
            max-width: 400px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .btn-login { 
            background-color: #2c3e50; 
            border: none; 
            padding: 12px;
            font-weight: bold;
        }
        .btn-login:hover { background-color: #34495e; }
        .signup-link { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container text-center">
            <h2 class="mb-4" style="color: #2c3e50;">تسجيل الدخول</h2>
            <p class="text-muted">أهلاً بك في نظام التشخيص الذكي</p>
            
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST" class="text-end">
                <div class="mb-3">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" placeholder="أدخل اسمك" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-login btn-primary w-100 text-white">دخول للمنصة</button>
            </form>
            
            <div class="mt-4">
                <p>ليس لديك حساب؟ <a href="/signup" class="signup-link">أنشئ حساباً جديداً الآن</a></p>
            </div>
        </div>
    </div>
</body>
</html>
