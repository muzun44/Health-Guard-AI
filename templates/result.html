<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الفحص - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px; border-radius: 20px;">
            <h2 class="mb-4">تحليل النتيجة الذكي</h2>
            <div class="alert alert-{{ status }} p-4">
                <h4>{{ result }}</h4>
                <hr>
                <p class="mb-0">{{ advice }}</p>
            </div>
            <a href="/" class="btn btn-outline-primary mt-3">إجراء فحص جديد</a>
        </div>
    </div>
</body>
</html>
