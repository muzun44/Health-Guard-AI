 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
        .result-card { max-width: 450px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .btn-back { background-color: #2c3e50; color: white; border-radius: 12px; padding: 12px 30px; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn-back:hover { background-color: #1a252f; color: white; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="result-card">
            <h3 class="mb-4" style="color: #2c3e50; font-weight: bold;">تحليل الذكاء الاصطناعي</h3>
            <div class="alert alert-{{ status }} p-4 mb-0">
                <h4 class="fw-bold">{{ result }}</h4>
                <hr>
                <p class="m-0">{{ advice }}</p>
            </div>
            <a href="/" class="btn-back">فحص جديد</a>
        </div>
    </div>
</body>
</html>
