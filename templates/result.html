<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة التحليل - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
        .result-card { max-width: 500px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .status-icon { font-size: 50px; margin-bottom: 20px; }
        .btn-back { background-color: #2c3e50; color: white; border-radius: 12px; padding: 10px 25px; text-decoration: none; transition: 0.3s; }
        .btn-back:hover { background-color: #1a252f; color: white; }
        .alert-success { background-color: #d4edda; border: none; color: #155724; border-radius: 15px; }
        .alert-danger { background-color: #f8d7da; border: none; color: #721c24; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <h2 class="mb-4" style="color: #2c3e50;">نتيجة الفحص الذكي</h2>
            
            <div class="alert alert-{{ status }} p-4 mb-4">
                <div class="status-icon">
                    {% if status == 'success' %} ✅ {% else %} ⚠️ {% endif %}
                </div>
                <h3 class="fw-bold">{{ result }}</h3>
                <hr>
                <p class="lead">{{ advice }}</p>
            </div>

            <a href="/" class="btn btn-back">إجراء فحص جديد</a>
        </div>
    </div>
</body>
</html>
