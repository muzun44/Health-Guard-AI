<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
        .result-card { max-width: 500px; margin: auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: right; }
        .tip-item { background: #f8f9fa; border-right: 4px solid #2c3e50; padding: 10px; margin-bottom: 8px; border-radius: 5px; list-style: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <h3 class="text-center mb-4" style="color: #2c3e50;">تقرير التحليل</h3>
            
            <div class="alert alert-{{ status }} text-center p-4 shadow-sm" style="border-radius: 15px;">
                <h4 class="fw-bold mb-0">{{ result }}</h4>
            </div>

            <div class="mt-4">
                <h6 class="fw-bold mb-3">📍 توصيات الذكاء الاصطناعي:</h6>
                <ul class="p-0">
                    {% for tip in tips %}
                        <li class="tip-item">{{ tip }}</li>
                    {% endfor %}
                </ul>
            </div>

            <div class="text-center mt-4">
                <a href="/" class="btn btn-dark w-100" style="border-radius: 12px; padding: 12px;">فحص جديد</a>
            </div>
        </div>
    </div>
</body>
</html>
