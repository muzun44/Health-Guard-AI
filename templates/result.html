<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .result-card { width: 100%; max-width: 500px; background: white; padding: 35px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: right; }
        .tip-item { background: #f8f9fa; border-right: 4px solid #2c3e50; padding: 12px; margin-bottom: 10px; border-radius: 8px; list-style: none; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="result-card">
        <h3 class="text-center mb-4" style="color: #2c3e50; font-weight: bold;">تقرير التحليل الطبي</h3>
        
        <div class="alert alert-{{ status }} text-center p-4 shadow-sm mb-4" style="border-radius: 20px;">
            <h4 class="fw-bold mb-0">{{ result }}</h4>
        </div>

        <div class="mt-4">
            <h6 class="fw-bold mb-3">📍 نصائح الذكاء الاصطناعي لك:</h6>
            <ul class="p-0">
                {% for tip in tips %}
                    <li class="tip-item">{{ tip }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-dark w-100" style="border-radius: 15px; padding: 12px; font-weight: bold;">إجراء فحص جديد</a>
        </div>
    </div>
</body>
</html>
