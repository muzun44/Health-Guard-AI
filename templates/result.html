 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
        .result-card { max-width: 500px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="result-card">
            <h2 class="mb-4" style="color: #2c3e50;">تحليل الذكاء الاصطناعي</h2>
            <div class="alert alert-{{ status }} p-4">
                <h3 class="fw-bold">{{ result }}</h3>
                <hr>
                <p class="lead">{{ advice }}</p>
            </div>
            <a href="/" class="btn btn-dark mt-3" style="border-radius: 12px; padding: 10px 30px;">فحص جديد</a>
        </div>
    </div>
</body>
</html>
