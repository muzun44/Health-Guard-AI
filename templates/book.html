<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-top: 50px; }
        .booking-card { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-book { background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container text-end">
        <div class="booking-card">
            <h2 class="text-center mb-4">🏥 حجز موعد جديد</h2>
            <form action="/book" method="POST">
                <div class="mb-3">
                    <label class="form-label">اختر المستشفى</label>
                    <select name="hospital" class="form-select" required>
                        <option value="مستشفى الملك فهد">مستشفى الملك فهد</option>
                        <option value="مستشفى العسكري">مستشفى العسكري</option>
                        <option value="مركز الرعاية الصحية">مركز الرعاية الصحية</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">القسم</label>
                    <select name="dept" class="form-select" required>
                        <option value="عيادة السكري">عيادة السكري</option>
                        <option value="عيادة القلب">عيادة القلب</option>
                        <option value="الباطنية">الباطنية</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">التاريخ</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الوقت</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn-book mt-3">تأكيد الحجز</button>
            </form>
            <div class="text-center mt-3">
                <a href="/" class="text-muted small text-decoration-none">إلغاء والعودة للرئيسية</a>
            </div>
        </div>
    </div>
</body>
</html>
