 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5 bg-light text-end">
    <div class="card p-4 mx-auto shadow rounded-4" style="max-width: 500px;">
        <h3 class="text-center mb-4">🏥 حجز موعد طبي</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">المستشفى</label>
                <select name="hospital" class="form-select">
                    <option>مستشفى الملك فهد</option>
                    <option>المستشفى العسكري</option>
                    <option>مركز الرعاية الصحية</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">القسم</label>
                <select name="dept" class="form-select">
                    <option>السكري والغدد</option>
                    <option>القلب</option>
                    <option>الباطنية</option>
                </select>
            </div>
            <div class="mb-3"><label>التاريخ</label><input type="date" name="date" class="form-control" required></div>
            <div class="mb-4"><label>الوقت</label><input type="time" name="time" class="form-control" required></div>
            <button class="btn btn-primary w-100 py-2">تأكيد الحجز</button>
        </form>
        <a href="/" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">إلغاء</a>
    </div>
</body>
</html>
