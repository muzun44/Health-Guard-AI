<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص السكر والضغط - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; min-height: 100vh; padding: 20px; }
        .check-card { max-width: 550px; margin: auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-predict { background-color: #27ae60; color: white; border-radius: 12px; padding: 12px; width: 100%; border: none; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-predict:hover { background-color: #219150; }
        .form-label { font-weight: 500; color: #495057; }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-card">
            <h2 class="text-center mb-4" style="color: #2c3e50;">🩺 فحص الذكاء الاصطناعي</h2>
            <p class="text-center text-muted mb-4">الرجاء إدخال القياسات الحالية بدقة</p>
            
            <form action="/predict" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3 text-end">
                        <label class="form-label">العمر</label>
                        <input type="number" name="age" class="form-control" placeholder="مثال: 45" required>
                    </div>
                    <div class="col-md-6 mb-3 text-end">
                        <label class="form-label">مستوى السكر</label>
                        <input type="number" name="glucose" class="form-control" placeholder="mg/dL" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3 text-end">
                        <label class="form-label">الضغط العالي (Systolic)</label>
                        <input type="number" name="systolic" class="form-control" placeholder="120" required>
                    </div>
                    <div class="col-md-6 mb-3 text-end">
                        <label class="form-label">الضغط المنخفض (Diastolic)</label>
                        <input type="number" name="diastolic" class="form-control" placeholder="80" required>
                    </div>
                </div>

                <button type="submit" class="btn-predict shadow-sm">بدء التحليل الآن</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small">إلغاء والعودة للرئيسية</a>
            </div>
        </div>
    </div>
</body>
</html>
