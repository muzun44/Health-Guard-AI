<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Guard AI - الفحص</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .main-card { max-width: 650px; margin: 60px auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .btn-predict { background-color: #27ae60; border: none; padding: 15px; font-size: 18px; color: white; width: 100%; border-radius: 15px; font-weight: bold; transition: 0.3s; }
        .btn-predict:hover { background-color: #219150; transform: translateY(-2px); }
        .form-control { border-radius: 12px; padding: 15px; border: 1px solid #e1e1e1; background-color: #fbfbfb; }
        .form-control:focus { border-color: #27ae60; box-shadow: none; background-color: white; }
        .logout-link { text-decoration: none; color: #e74c3c; font-weight: bold; font-size: 14px; padding: 8px 15px; border-radius: 20px; background-color: #fff1f0; }
    </style>
</head>
<body>
    <div class="container text-end">
        <div class="main-card">
            <div class="d-flex justify-content-between align-items-center mb-5 pb-3" style="border-bottom: 2px solid #f0f0f0;">
                <a href="/logout" class="logout-link">تسجيل الخروج</a>
                <div>
                    <h3 class="m-0" style="color: #2c3e50; font-weight: 700;">فحص المؤشرات الحيوية</h3>
                    <p class="text-muted m-0">مرحباً بك، <strong>{{ user }}</strong>!</p>
                </div>
            </div>
            
            <form action="/predict" method="POST">
                <div class="mb-4 text-start">
                    <label class="form-label text-end d-block text-muted">العمر</label>
                    <input type="number" name="age" class="form-control" placeholder="مثال: 30" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-end d-block text-muted">مستوى الجلوكوز (السكر)</label>
                    <input type="number" name="glucose" class="form-control" placeholder="مثال: 110" required>
                </div>

                <div class="mb-5 text-start">
                    <label class="form-label text-end d-block text-muted mb-2">ضغط الدم (Systolic / Diastolic)</label>
                    <div class="row g-3">
                        <div class="col">
                            <input type="number" name="systolic" class="form-control" placeholder="العالي (مثال: 120)" required>
                        </div>
                        <div class="col">
                            <input type="number" name="diastolic" class="form-control" placeholder="المنخفض (مثال: 80)" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-predict">بدء تحليل الذكاء الاصطناعي</button>
            </form>
        </div>
    </div>
</body>
</html>
