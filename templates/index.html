<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Health Guard</title>
</head>
<body class="bg-light text-end">
    <div class="p-4 bg-white shadow-sm mb-4 d-flex justify-content-between align-items-center">
        <a href="/logout" class="btn btn-outline-danger btn-sm">خروج</a>
        <h2 class="m-0">مرحباً، {{ name }} ✨</h2>
    </div>
    <div class="container">
        <div class="row g-3">
            <div class="col-6"><a href="/book" class="btn btn-primary w-100 p-4 shadow-sm">🏥 حجز موعد</a></div>
            <div class="col-6"><a href="/check" class="btn btn-success w-100 p-4 shadow-sm">🩺 فحص السكر</a></div>
            <div class="col-12"><a href="/bmi" class="btn btn-info w-100 p-3 text-white shadow-sm">⚖️ حساب الوزن</a></div>
        </div>

        <h4 class="mt-5 mb-3">📅 جدول مواعيدك:</h4>
        <div class="card p-3 border-0 shadow-sm rounded-4">
            {% if appointments %}
            <table class="table table-hover">
                <thead><tr><th>المستشفى</th><th>التاريخ</th><th>الوقت</th></tr></thead>
                <tbody>
                {% for app in appointments %}
                <tr><td>{{ app[0] }}</td><td>{{ app[2] }}</td><td>{{ app[3] }}</td></tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %} <p class="text-center text-muted">لا توجد مواعيد محجوزة حالياً.</p> {% endif %}
        </div>
    </div>
</body>
</html>
