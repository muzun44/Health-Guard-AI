<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Guard AI - الفحص</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .main-card { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-title { color: #2c3e50; font-weight: bold; margin-bottom: 25px; }
        .btn-predict { background-color: #27ae60; border: none; padding: 12px; font-size: 18px; }
        .btn-predict:hover { background-color: #219150; }
        .logout-link { text-decoration: none; color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container text-end">
        <div class="main-card">
            <div class="d-flex justify-content-between align-items-center">
                <a href="/logout" class="logout-link">تسجيل الخروج</a>
                <h2 class="header-title">فحص المؤشرات الحيوية</h2>
            </div>
            
            <form action="/predict" method="POST">
                <div class="mb-4 text-start">
                    <label class="form-label text-end d-block">العمر</label>
                    <input type="number" name="age" class="form-control" placeholder="مثال: 25" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-end d-block">مستوى الجلوكوز (السكر)</label>
                    <input type="number" name="glucose" class="form-control" placeholder="مثال: 110" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-end d-block">ضغط الدم (Blood Pressure)</label>
                    <div class="row g-2">
                        <div class="col">
                            <input type="number" name="systolic" class="form-control" placeholder="العالي (Systolic)" required>
                        </div>
                        <div class="col">
                            <input type="number" name="diastolic" class="form-control" placeholder="المنخفض (Diastolic)" required>
                        </div>
                    </div>
                    <small class="text-muted mt-1 d-block">أدخل القيمتين بشكل منفصل (مثل 120 و 80)</small>
                </div>

                <button type="submit" class="btn btn-predict w-100 text-white">بدء التوقع الذكي</button>
            </form>
        </div>
    </div>
</body>
</html>
