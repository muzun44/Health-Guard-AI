 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="card p-4 mx-auto shadow-sm rounded-4" style="width: 400px;">
        <h3 class="text-center mb-4">إنشاء حساب</h3>
        <form method="POST">
            <input type="text" name="fullname" placeholder="الاسم الكامل" class="form-control mb-3" required>
            <input type="text" name="username" placeholder="اسم المستخدم (اليوزر)" class="form-control mb-3" required>
            <input type="password" name="password" placeholder="كلمة المرور" class="form-control mb-3" required>
            <button class="btn btn-primary w-100 py-2">سجل الآن</button>
        </form>
        <div class="text-center mt-3"><a href="/login" class="small text-decoration-none">لديك حساب؟ سجل دخول</a></div>
    </div>
</body>
</html>
