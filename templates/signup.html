<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .signup-card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-signup { background-color: #6c5ce7; color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; transition: 0.3s; }
        .btn-signup:hover { background-color: #5b4bc4; }
        .form-label { font-weight: bold; color: #2d3436; }
    </style>
</head>
<body>
    <div class="container">
        <div class="signup-card">
            <h2 class="text-center mb-4">📝 إنشاء حساب جديد</h2>
            <form action="/signup" method="POST">
                <div class="mb-3 text-end">
                    <label class="form-label">الاسم الكامل</label>
                    <input type="text" name="fullname" class="form-control" placeholder="ادخلي اسمك الثلاثي" required>
                </div>

                <div class="mb-3 text-end">
                    <label class="form-label">اسم المستخدم (اليوزر)</label>
                    <input type="text" name="username" class="form-control" placeholder="مثال: s_2024" required>
                </div>

                <div class="mb-3 text-end">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                    <small class="text-muted">يجب أن تكون 8 خانات وتحتوي على رقم ورمز خاص.</small>
                </div>

                <button type="submit" class="btn-signup shadow-sm">إنشاء الحساب</button>
            </form>
            <div class="text-center mt-3">
                <p>لديك حساب بالفعل؟ <a href="/login" class="text-decoration-none">تسجيل دخول</a></p>
            </div>
        </div>
    </div>
</body>
</html>
