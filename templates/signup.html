 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Health Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; 
        }
        .signup-card { 
            max-width: 400px; margin: auto; background: white; padding: 40px; 
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        .btn-success { 
            background-color: #27ae60; border: none; padding: 12px; 
            border-radius: 12px; font-weight: bold; width: 100%;
        }
        .btn-success:hover { background-color: #219150; transform: scale(1.02); }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="signup-card text-center">
            <h2 class="mb-4" style="color: #2c3e50; font-weight: bold;">انضم إلينا ✨</h2>
            <p class="text-muted mb-4">أنشئ حسابك الطبي لتبدأ رحلة الفحص الذكي</p>
            
            <form action="/signup" method="POST" class="text-end">
                <div class="mb-3">
                    <label class="form-label text-muted">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" placeholder="اختر اسماً مميزاً" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-success text-white">تسجيل الحساب</button>
            </form>
            
            <div class="mt-4">
                <p class="text-muted">لديك حساب؟ <a href="/login" style="color: #2c3e50; text-decoration: none; font-weight: bold;">سجل دخولك</a></p>
            </div>
        </div>
    </div>
</body>
</html>
